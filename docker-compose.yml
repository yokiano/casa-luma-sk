services:
  postgres:
    image: postgres:16
    container_name: casa-luma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: casa_luma
    ports:
      - '5432:5432'
    volumes:
      - casa_luma_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d casa_luma']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  casa_luma_pgdata:
